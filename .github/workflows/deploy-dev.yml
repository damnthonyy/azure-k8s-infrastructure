name: Deploy to Development

# Trigger on push to develop branch
on:
  push:
    branches:
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required permissions
permissions:
  contents: read
  packages: write

jobs:
  # Build and test backend
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('applications/backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: ./applications/backend
        run: |
          if compgen -G "*.csproj" > /dev/null; then
            dotnet restore
          else
            echo "No .NET project found yet, skipping restore"
          fi
      
      - name: Build
        working-directory: ./applications/backend
        run: |
          if compgen -G "*.csproj" > /dev/null; then
            dotnet build --no-restore --configuration Release
          else
            echo "No .NET project found yet, skipping build"
          fi
      
      - name: Run tests
        working-directory: ./applications/backend
        run: |
          if compgen -G "*.csproj" > /dev/null; then
            dotnet test --no-build --configuration Release --verbosity normal
          else
            echo "No .NET project found yet, skipping tests"
          fi

  # Build and test frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './applications/frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./applications/frontend
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "No Node.js project found yet, skipping"
          fi
      
      - name: Run linter
        working-directory: ./applications/frontend
        run: |
          if [ -f "package.json" ]; then
            npm run lint || true
          else
            echo "No Node.js project found yet, skipping"
          fi
      
      - name: Run tests
        working-directory: ./applications/frontend
        run: |
          if [ -f "package.json" ]; then
            npm test || echo "No tests configured yet"
          else
            echo "No Node.js project found yet, skipping"
          fi
      
      - name: Build application
        working-directory: ./applications/frontend
        run: |
          if [ -f "package.json" ]; then
            npm run build
          else
            echo "No Next.js project found yet, skipping"
          fi

  # Deploy infrastructure to dev environment
  deploy-infrastructure:
    name: Deploy Infrastructure (Dev)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: development
      url: https://dev.azure-k8s-infrastructure.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Terraform Init
        working-directory: ./terraform/environments/dev
        run: |
          # Will be fully configured once backend storage is set up
          terraform init -backend=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      
      - name: Terraform Apply
        working-directory: ./terraform/environments/dev
        run: |
          echo "Terraform apply will be executed here once modules are ready"
          # terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  # Deploy applications to dev environment
  deploy-applications:
    name: Deploy Applications (Dev)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'
      
      - name: Get AKS credentials
        run: |
          echo "Getting AKS credentials..."
          # az aks get-credentials --resource-group <rg> --name <aks-name>
      
      - name: Deploy to Kubernetes
        run: |
          echo "Kubernetes deployment will be executed here once clusters are ready"
          # kubectl apply -f kubernetes/backend/ -n backend
          # kubectl apply -f kubernetes/frontend/ -n frontend

  # Notification job
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-applications]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "🚀 Deployment to Development Complete"
          echo "Infrastructure: ${{ needs.deploy-infrastructure.result }}"
          echo "Applications: ${{ needs.deploy-applications.result }}"
