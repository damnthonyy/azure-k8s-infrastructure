name: CI - Continuous Integration

# Trigger on pull requests to main and develop branches
on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Permissions needed for the workflow
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Job to validate Terraform code
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init (Dev)
        working-directory: ./terraform/environments/dev
        run: terraform init -backend=false
      
      - name: Terraform Validate
        working-directory: ./terraform/environments/dev
        run: terraform validate

  # Job to validate Ansible playbooks
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint
      
      - name: Ansible Syntax Check
        working-directory: ./ansible
        run: |
          # Check syntax for all playbooks when they exist
          if ls playbooks/*.yml 1> /dev/null 2>&1; then
            for playbook in playbooks/*.yml; do
              echo "Checking syntax: $playbook"
              ansible-playbook --syntax-check "$playbook" || true
            done
          else
            echo "No playbooks found yet, skipping check"
          fi

  # Job to validate Kubernetes manifests
  kubernetes-validate:
    name: Kubernetes Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'
      
      - name: Validate Kubernetes manifests
        working-directory: ./kubernetes
        run: |
          # Validate all YAML files in kubernetes directory
          for dir in */; do
            if [ -d "$dir" ]; then
              echo "Validating manifests in $dir"
              kubectl apply --dry-run=client -f "$dir" || true
            fi
          done

  # Job to check code formatting and linting
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check file permissions
        run: |
          # Check for executable scripts
          find scripts/ -type f -name "*.sh" ! -executable -print
      
      - name: Check for secrets
        run: |
          # Basic check for common secret patterns (not foolproof)
          echo "Checking for potential secrets..."
          grep -r -E '(password|client_secret|secret|token|access_key)\s*=\s*["\x27][^"\x27]{8,}["\x27]' \
            --include="*.tf" \
            --include="*.yml" \
            --include="*.yaml" \
            --exclude="backend.tf" \
            . && {
            echo "⚠️  Warning: Potential hardcoded secrets found"
            exit 1
          }
      
      - name: Check YAML syntax
        run: |
          # Install yamllint
          pip install yamllint
          
          # Lint all YAML files
          yamllint -d "{extends: default, rules: {line-length: {max: 120}}}" . || true

  # Summary job that depends on all checks
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [terraform-validate, ansible-lint, kubernetes-validate, code-quality]
    if: always()
    
    steps:
      - name: Check CI Results
        run: |
          echo "CI Pipeline Results:"
          echo "===================="
          echo "Terraform: ${{ needs.terraform-validate.result }}"
          echo "Ansible: ${{ needs.ansible-lint.result }}"
          echo "Kubernetes: ${{ needs.kubernetes-validate.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          
          if [[ "${{ needs.terraform-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.ansible-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.kubernetes-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.code-quality.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
