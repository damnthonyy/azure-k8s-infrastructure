name: CI - Continuous Integration

# Trigger on pull requests to main and develop branches
on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions needed for the workflow
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Job to validate Terraform code
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive
      
      - name: Terraform Init (Dev)
        working-directory: ./terraform/environments/dev
        run: terraform init -backend=false
      
      - name: Terraform Validate
        working-directory: ./terraform/environments/dev
        run: terraform validate

  # Job to validate Ansible playbooks
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        # pip cache will be re-enabled once requirements/pyproject are added
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint
      
      - name: Ansible Syntax Check
        working-directory: ./ansible
        run: |
          if ls playbooks/*.yml 1> /dev/null 2>&1; then
            echo "Running Ansible syntax check for playbooks"
            for playbook in playbooks/*.yml; do
              echo "Checking syntax: $playbook"
              ansible-playbook --syntax-check "$playbook"
            done
          else
            echo "No playbooks found yet, skipping Ansible syntax check"
          fi

  # Job to validate Kubernetes manifests
  kubernetes-validate:
    name: Kubernetes Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'
      
      - name: Validate Kubernetes manifests
        working-directory: ./kubernetes
        run: |
          set -e

          has_manifests=false
          for dir in */; do
            if [ -d "$dir" ]; then
              if ls "$dir"/*.yml "$dir"/*.yaml 1> /dev/null 2>&1; then
                has_manifests=true
                echo "Validating manifests in $dir"
                kubectl apply --dry-run=client -f "$dir"
              fi
            fi
          done

          if [ "$has_manifests" = false ]; then
            echo "No Kubernetes manifests found, skipping validation"
          fi

  # Summary job that depends on all checks
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [terraform-validate, ansible-lint, kubernetes-validate]
    if: always()
    
    steps:
      - name: Check CI Results
        continue-on-error: true
        run: |
          echo "CI Pipeline Results:"
          echo "===================="
          echo "Terraform: ${{ needs.terraform-validate.result }}"
          echo "Ansible: ${{ needs.ansible-lint.result }}"
          echo "Kubernetes: ${{ needs.kubernetes-validate.result }}"
          
          if [[ "${{ needs.terraform-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.ansible-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.kubernetes-validate.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
