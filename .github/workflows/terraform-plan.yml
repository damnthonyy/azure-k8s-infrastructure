name: Terraform Plan

# Trigger on pull requests that modify Terraform files
on:
  workflow_dispatch: # Allow manual trigger of the workflow
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required permissions
permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    # Matrix strategy to plan for all environments
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        # Note: AZURE_CREDENTIALS should be in format:
        # {
        #   "clientId": "",
        #   "clientSecret": "",
        #   "subscriptionId": "",
        #   "tenantId": ""
        # }

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ matrix.environment }}
        run: |
          # Initialize Terraform with backend configuration
          # Backend will be configured once Azure Storage is set up
          terraform init -backend=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Plan
        working-directory: ./terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -out=tfplan-${{ matrix.environment }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ./terraform/environments/${{ matrix.environment }}/tfplan-${{ matrix.environment }}
          retention-days: 5

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Preview · ${{ matrix.environment }}

            | Field | Value |
            | --- | --- |
            | Environment | \`${{ matrix.environment }}\` |
            | Trigger | \`${{ github.event_name }}\` |
            | Workflow | \`${{ github.workflow }}\` |
            | Author | @${{ github.actor }} |
            | Plan file | \`tfplan-${{ matrix.environment }}\` |

            <details>
            <summary>View plan details</summary>

            \`\`\`terraform
            Plan will be displayed here in future iterations
            \`\`\`

            </details>

            *Automatically generated by GitHub Actions.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
